<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Banking — Customer Journey Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TOKENS — mapped from Value.tokens.json
   neutral.900 #1A1A33  · brand.brand #5BFF9A
   brand.300   #00A363  · brand.400   #2ADAA5
   accent.blue-500 #3280F6 · accent.teal #36A6AC
   accent.orange-500 #F7871D · neutral.300 #AEAEAE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root {
  /* surfaces — built on neutral.900 #1A1A33 */
  --ink:       #0f0f1f;
  --ink2:      #1A1A33;
  --ink3:      #1f1f3d;
  --ink4:      #262645;
  --line:      rgba(255,255,255,0.06);
  --line2:     rgba(255,255,255,0.10);
  --fog:       rgba(255,255,255,0.5);
  --fog2:      rgba(255,255,255,0.3);
  --snow:      #ffffff;
  --snow2:     rgba(255,255,255,0.8);

  /* swimlane row colours */
  --mobile-h:  rgba(50,128,246,0.15);   /* blue-500 tint */
  --web-h:     rgba(0,163,99,0.15);     /* brand.300 tint */
  --pain-h:    rgba(247,135,29,0.12);   /* orange-500 tint */
  --oppty-h:   rgba(42,218,165,0.10);   /* brand.400 tint */
  --kpi-h:     rgba(54,166,172,0.12);   /* teal tint */

  /* card accent colours */
  --user-ring: #3280F6;    /* accent.blue-500 */
  --sys-ring:  #36A6AC;    /* accent.teal */
  --pain-ring: #F7871D;    /* accent.orange-500 */
  --oppty-ring:#2ADAA5;    /* brand.400 */
  --kpi-ring:  #36A6AC;    /* accent.teal */

  --label-w:   148px;
  --header-h:  58px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--ink);
  color: var(--snow);
  font-family: 'Manrope', sans-serif;
  font-size: 13px;
  line-height: 1.5;
  overflow-x: hidden;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TOP BAR
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--ink2);
  border-bottom: 1px solid var(--line2);
  display: flex; align-items: center;
  padding: 0 22px;
  gap: 0;
  z-index: 500;
}
.tb-logo {
  display: flex; align-items: center; gap: 12px;
  margin-right: 28px; flex-shrink: 0;
}
.tb-logo-mark {
  width: 34px; height: 34px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.tb-logo-mark svg { width: 34px; height: 34px; }
.tb-title {
  font-size: 13.5px; font-weight: 700; color: var(--snow);
  letter-spacing: -0.2px; font-family: 'Manrope', sans-serif;
}
.tb-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; color: var(--fog2);
  letter-spacing: 0.03em;
}
.tb-tabs {
  display: flex; gap: 2px; flex: 1;
  overflow-x: auto; scrollbar-width: none;
  align-items: center;
}
.tb-tabs::-webkit-scrollbar { display: none; }
.tb-tab {
  flex-shrink: 0;
  padding: 6px 13px;
  border-radius: 6px;
  font-size: 12px; font-weight: 500;
  cursor: pointer; border: none;
  background: transparent; color: var(--fog);
  transition: all 0.14s; white-space: nowrap;
  letter-spacing: -0.1px;
}
.tb-tab:hover { background: var(--ink4); color: rgba(255,255,255,0.8); }
.tb-tab.active { background: var(--ink4); color: #5BFF9A; }

.tb-legend {
  display: flex; align-items: center; gap: 14px;
  margin-left: 20px; flex-shrink: 0;
  padding-left: 20px;
  border-left: 1px solid var(--line2);
}
.tbl-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 10.5px; color: rgba(255,255,255,0.5);
  white-space: nowrap;
}
.tbl-dot {
  width: 7px; height: 7px; border-radius: 50%;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LAYOUT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.page {
  padding-top: var(--header-h);
}

.product-panel { display: none; }
.product-panel.active { display: block; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PRODUCT BANNER
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.prod-banner {
  padding: 22px 28px 18px;
  border-bottom: 1px solid var(--line2);
  display: flex; align-items: center; gap: 16px;
  background: var(--ink2);
}
.prod-icon {
  width: 46px; height: 46px; border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.prod-name {
  font-size: 20px; font-weight: 800;
  letter-spacing: -0.5px; color: #fff;
}
.prod-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: rgba(255,255,255,0.4);
  margin-top: 2px; letter-spacing: 0.02em;
}
.prod-tags {
  margin-left: auto; display: flex; gap: 6px;
}
.prod-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; padding: 3px 9px; border-radius: 4px;
  border: 1px solid var(--line2); color: rgba(255,255,255,0.4);
}

/* stage name label strip — replaces tabs */
.stage-label-strip {
  display: flex; align-items: stretch;
  background: var(--ink3);
  border-bottom: 1px solid var(--line2);
  overflow-x: auto; scrollbar-width: none;
}
.stage-label-strip::-webkit-scrollbar { display: none; }
.stage-label-item {
  flex-shrink: 0;
  padding: 9px 18px;
  font-size: 11px; font-weight: 600;
  color: var(--fog);
  border-right: 1px solid var(--line);
  display: flex; align-items: center; gap: 7px;
  letter-spacing: 0.01em;
  white-space: nowrap;
}
.stage-label-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; padding: 1px 6px;
  border-radius: 3px; font-weight: 500;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   STAGE VIEW — the main canvas
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.stage-view { display: block; }

/* The journey board scrolls horizontally */
.board-scroll-wrap {
  overflow-x: auto;
  overflow-y: visible;
  scrollbar-width: thin;
  scrollbar-color: var(--ink4) transparent;
  padding-bottom: 24px;
}
.board-scroll-wrap::-webkit-scrollbar { height: 6px; }
.board-scroll-wrap::-webkit-scrollbar-track { background: transparent; }
.board-scroll-wrap::-webkit-scrollbar-thumb { background: var(--ink4); border-radius: 4px; }

/* 
  Board is a CSS grid:
    col 1              = label column (fixed width)
    col 2..N           = one column per step
*/
.board {
  display: inline-grid; /* width expands with content */
  min-width: 100%;
  /* grid-template-columns set dynamically via JS */
  /* grid-template-rows: auto per swimlane */
}

/* ── Step header row ─────────────────────────────── */
.step-header-cell {
  background: var(--ink3);
  border-bottom: 1px solid var(--line2);
  border-right: 1px solid var(--line);
  padding: 10px 14px 12px;
  position: sticky;
  top: 0;
  z-index: 10;
  min-height: 80px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}
.step-header-cell.label-col {
  left: 0;
  z-index: 20;
  background: var(--ink2);
  border-right: 2px solid var(--line2);
  width: var(--label-w);
  justify-content: flex-end;
}
.step-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px; font-weight: 400; color: rgba(255,255,255,0.25);
  letter-spacing: 0.08em; margin-bottom: 4px;
}
.step-title {
  font-size: 12.5px; font-weight: 600; color: #ffffff;
  line-height: 1.35;
}
/* connector arrow after each step header (except last) */
.step-header-cell:not(.label-col)::after {
  content: '';
  position: absolute;
  right: -9px; top: 50%;
  transform: translateY(-50%);
  width: 0; height: 0;
  border-top: 7px solid transparent;
  border-bottom: 7px solid transparent;
  border-left: 8px solid var(--line2);
  z-index: 11;
}
.step-header-cell.last-step::after { display: none; }

/* ── Swimlane label cells ─────────────────────────── */
.lane-label-cell {
  position: sticky; left: 0;
  z-index: 15;
  background: var(--ink2);
  border-right: 2px solid var(--line2);
  border-bottom: 1px solid var(--line);
  padding: 12px 14px;
  display: flex; flex-direction: column;
  justify-content: flex-start; gap: 3px;
  width: var(--label-w);
  min-height: 80px;
}
.lane-label-cell.platform-mobile { border-left: 3px solid #3280F6; }
.lane-label-cell.platform-web    { border-left: 3px solid #00A363; }
.lane-label-cell.pain-lane       { border-left: 3px solid #F7871D; }
.lane-label-cell.oppty-lane      { border-left: 3px solid #2ADAA5; }
.lane-label-cell.kpi-lane        { border-left: 3px solid #36A6AC; }

.lane-name {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.02em; color: #ffffff;
}
.lane-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: rgba(255,255,255,0.4); letter-spacing: 0.04em;
}
.lane-platform-chip {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 9.5px; font-weight: 500;
  padding: 2px 7px; border-radius: 4px; margin-top: 4px;
  font-family: 'JetBrains Mono', monospace;
}
.chip-mob { background: rgba(50,128,246,0.18); color: #3280F6; }
.chip-web { background: rgba(0,163,99,0.18);  color: #2ADAA5; }

/* ── Body cells (cards go inside these) ──────────── */
.lane-cell {
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 10px 10px;
  vertical-align: top;
  min-height: 80px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: flex-start;
}

/* platform lane backgrounds */
.mobile-row .lane-cell { background: rgba(50,128,246,0.04); }
.web-row    .lane-cell { background: rgba(0,163,99,0.04); }
.pain-row   .lane-cell { background: rgba(247,135,29,0.04); }
.oppty-row  .lane-cell { background: rgba(42,218,165,0.04); }
.kpi-row    .lane-cell { background: rgba(54,166,172,0.04); }

/* empty cell */
.lane-cell.empty {
  opacity: 0.3;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ACTION CARDS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.action-card {
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 11.5px;
  line-height: 1.45;
  color: rgba(255,255,255,0.8);
  border: 1px solid transparent;
  width: 100%;
  transition: transform 0.12s, box-shadow 0.12s;
  cursor: default;
  position: relative;
}
.action-card:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.35);
  z-index: 5;
}

/* card type variants */
.card-user {
  background: rgba(50,128,246,0.12);
  border-color: rgba(50,128,246,0.30);
}
.card-system {
  background: rgba(54,166,172,0.10);
  border-color: rgba(54,166,172,0.28);
}
.card-pain {
  background: rgba(247,135,29,0.12);
  border-color: rgba(247,135,29,0.32);
}
.card-oppty {
  background: rgba(42,218,165,0.11);
  border-color: rgba(42,218,165,0.28);
}
.card-kpi {
  background: rgba(54,166,172,0.12);
  border-color: rgba(54,166,172,0.30);
}
.card-na {
  background: rgba(220, 38, 38, 0.12);
  border-color: rgba(220, 38, 38, 0.45);
  border-style: dashed;
}

.card-type-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px; font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 4px;
  opacity: 0.75;
}
.tag-user   { color: #3280F6; }
.tag-system { color: #36A6AC; }
.tag-pain   { color: #F7871D; }
.tag-oppty  { color: #2ADAA5; }
.tag-kpi    { color: #36A6AC; }
.tag-na     { color: #FF6B6B; }

.card-body { color: rgba(255,255,255,0.8); }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SECTION DIVIDERS between swimlane groups
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.divider-row .lane-label-cell,
.divider-row .lane-cell {
  min-height: 6px;
  padding: 0;
  background: var(--line);
  border-bottom: none;
}
.divider-row .lane-label-cell {
  background: var(--line2);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   STEP CONNECTOR TRACK (visual timeline line)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.step-track-row .lane-cell {
  min-height: 0; height: 3px; padding: 0;
  background: var(--line);
  border-bottom: none;
  position: relative;
}
.step-track-row .lane-cell::before {
  content: '';
  position: absolute;
  inset: 0;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   EMPTY STATE DASH
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.na-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; color: rgba(255,255,255,0.2);
  padding: 6px 4px;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SCROLL HINT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.scroll-hint {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 28px;
  font-size: 10.5px; color: rgba(255,255,255,0.35);
  font-family: 'JetBrains Mono', monospace;
  border-bottom: 1px solid var(--line);
  background: var(--ink2);
}
.scroll-hint-arrow { font-size: 14px; animation: nudge 1.8s ease-in-out infinite; }
@keyframes nudge {
  0%,100% { transform: translateX(0); }
  50%      { transform: translateX(5px); }
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--ink4); border-radius: 4px; }
</style>
</head>
<body>

<!-- ━━━━━━━━━━━━━━━━━━━━ TOP BAR ━━━━━━━━━━━━━━━━━━━━ -->
<header class="topbar">
  <div class="tb-logo">
    <div class="tb-logo-mark">
      <svg width="68" height="68" viewBox="0 0 68 68" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M68 34V13.5987V0H54.398H34V13.5987H54.398V34H68Z" fill="#006D6B"/>
        <path d="M54.398 34C54.398 45.2682 45.2649 54.398 34 54.398C22.7351 54.398 13.5987 45.2649 13.5987 34C13.5987 22.7351 22.7318 13.5987 34 13.5987C45.2682 13.5987 54.398 22.7318 54.398 34ZM67.9966 34C68 15.2219 52.7781 0 34 0C15.2219 0 0 15.2219 0 34C0 52.7781 15.2219 68 34 68C52.7781 68 68 52.7781 68 34" fill="#2ADAA5"/>
      </svg>
    </div>
    <div>
      <div class="tb-title">Business Banking</div>
      <div class="tb-sub">CUSTOMER JOURNEY MAP</div>
    </div>
  </div>
  <div class="tb-tabs" id="productTabs"></div>
  <div class="tb-legend">
    <div class="tbl-item"><div class="tbl-dot" style="background:#3280F6"></div>User</div>
    <div class="tbl-item"><div class="tbl-dot" style="background:#36A6AC"></div>System</div>
    <div class="tbl-item"><div class="tbl-dot" style="background:#F7871D"></div>Pain</div>
    <div class="tbl-item"><div class="tbl-dot" style="background:#2ADAA5"></div>Opportunity</div>
    <div class="tbl-item"><div class="tbl-dot" style="background:#36A6AC"></div>KPI</div>
  </div>
</header>

<div class="page" id="page"></div>

<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   DATA MODEL
   Each stage has steps (columns).
   Each step has:
     mobile:  [ {type:'user'|'system', text} ]
     web:     [ {type:'user'|'system', text} ]
     pain:    [ string ]
     oppty:   [ string ]
     kpi:     [ string ]
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const PRODUCTS = [
{
  id:'onboarding', name:'Onboarding', emoji:'🚀', accent:'#5BFF9A', accentDim:'rgba(91,255,154,0.10)',
  stages:[
  {

function card(type, text) {
  const labels = { user:'👤 User', system:'⚙️ System' };
  const showTag = type === 'user' || type === 'system';
  const isNA = type === 'na';
  return `<div class="action-card card-${type}">
    ${showTag ? `<div class="card-type-tag tag-${type}">${labels[type]}</div>` : ''}
    ${isNA ? `<div class="card-type-tag tag-na">🚫 Not Available</div>` : ''}
    <div class="card-body">${isNA ? 'Not available on this platform' : text}</div>
  </div>`;
}

function buildCell(items, type, stepIdx, totalSteps) {
  if (!items || items.length === 0) {
    return `<div class="lane-cell empty"><span class="na-label">—</span></div>`;
  }
  let html = `<div class="lane-cell">`;
  items.forEach(item => {
    const text = typeof item === 'string' ? item : item.text;
    let t = typeof item === 'string' ? type : item.t;
    if (typeof text === 'string' && text.trim().toUpperCase() === 'NOT AVAILABLE') {
      t = 'na';
    }
    html += card(t, text);
  });
  html += `</div>`;
  return html;
}

    }

}

// Build one merged board across ALL stages for a product
function buildProductBoard(prod) {
  // Flatten: for each stage, tag each step with stage info
  const allSteps = [];
  prod.stages.forEach((stage, si) => {
    stage.steps.forEach((step, stepI) => {
      allSteps.push({ ...step, stageName: stage.name, stageIndex: si, isFirstOfStage: stepI === 0 });
    });
  });

  const N = allSteps.length;
  const colTemplate = `148px repeat(${N}, minmax(200px, 240px))`;

  let html = `<div class="board-scroll-wrap"><div class="board" style="grid-template-columns:${colTemplate}">`;

  // ── Step header row ───────────────────────────────────
  // Corner
  html += `<div class="step-header-cell label-col" style="position:sticky;top:0;left:0;z-index:30;background:var(--ink2);"></div>`;

  allSteps.forEach((step, i) => {
    const isLast = i === N - 1;
    // Stage boundary: stronger top accent + stage label when first step of a stage
    const stageLabel = step.isFirstOfStage
      ? `<div style="position:absolute;top:10px;left:14px;right:14px;font-family:'JetBrains Mono',monospace;font-size:8px;color:${prod.accent};letter-spacing:0.1em;text-transform:uppercase;font-weight:600;">${step.stageName}</div>`
      : '';
    html += `<div class="step-header-cell${isLast ? ' last-step' : ''}" style="position:relative;border-top:3px solid ${step.isFirstOfStage ? prod.accent : prod.accent + '44'};">
      ${stageLabel}
      <div class="step-num">STEP ${i + 1}</div>
      <div class="step-title">${step.name}</div>
    </div>`;
  });

  // ── Mobile row ────────────────────────────────────────
  html += `<div class="lane-label-cell platform-mobile">
    <span class="lane-name">📱 Mobile</span>
    <span class="lane-sub">iOS &amp; Android</span>
    <span class="lane-platform-chip chip-mob">Mobile App</span>
  </div>`;
  allSteps.forEach((step, i) => { html += buildCell(step.mobile, 'user', i, N); });

  // ── Web row ───────────────────────────────────────────
  html += `<div class="lane-label-cell platform-web">
    <span class="lane-name">🖥️ Web</span>
    <span class="lane-sub">Browser App</span>
    <span class="lane-platform-chip chip-web">Web Desktop</span>
  </div>`;
  allSteps.forEach((step, i) => { html += buildCell(step.web, 'user', i, N); });

  // ── Divider ───────────────────────────────────────────
  html += `<div class="lane-label-cell" style="min-height:8px;padding:0;background:var(--line);border-right:2px solid var(--line2)"></div>`;
  for (let i = 0; i < N; i++) html += `<div style="background:var(--line);border-right:1px solid var(--line);min-height:8px"></div>`;

  // ── Pain Points ───────────────────────────────────────
  html += `<div class="lane-label-cell pain-lane">
    <span class="lane-name">⚠️ Pain Points</span>
    <span class="lane-sub">Friction &amp; drop-off</span>
  </div>`;
  allSteps.forEach((step, i) => {
    const items = (step.pain||[]).map(t => ({ t:'pain', text:t }));
    html += buildCell(items.length ? items : null, 'pain', i, N);
  });

  // ── Opportunities ─────────────────────────────────────
  html += `<div class="lane-label-cell oppty-lane">
    <span class="lane-name">💡 Opportunities</span>
    <span class="lane-sub">UX &amp; growth wins</span>
  </div>`;
  allSteps.forEach((step, i) => {
    const items = (step.oppty||[]).map(t => ({ t:'oppty', text:t }));
    html += buildCell(items.length ? items : null, 'oppty', i, N);
  });

  // ── KPIs ──────────────────────────────────────────────
  html += `<div class="lane-label-cell kpi-lane">
    <span class="lane-name">📊 KPIs &amp; Metrics</span>
    <span class="lane-sub">How we measure success</span>
  </div>`;
  allSteps.forEach((step, i) => {
    const items = (step.kpi||[]).map(t => ({ t:'kpi', text:t }));
    html += buildCell(items.length ? items : null, 'kpi', i, N);
  });

  html += `</div></div>`;
  return html;
}

function build() {
  const tabsEl = document.getElementById('productTabs');
  const pageEl = document.getElementById('page');

  PRODUCTS.forEach((prod, pi) => {
    const totalSteps = prod.stages.reduce((a, s) => a + s.steps.length, 0);

    // ── Product tab
    const tab = document.createElement('button');
    tab.className = 'tb-tab' + (pi === 0 ? ' active' : '');
    tab.textContent = `${prod.emoji} ${prod.name}`;
    if (pi === 0) tab.style.color = prod.accent;
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tb-tab').forEach(t => { t.classList.remove('active'); t.style.color = ''; });
      document.querySelectorAll('.product-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      tab.style.color = prod.accent;
      document.getElementById('panel-' + prod.id).classList.add('active');
    });
    tabsEl.appendChild(tab);

    // ── Product panel
    const panel = document.createElement('div');
    panel.className = 'product-panel' + (pi === 0 ? ' active' : '');
    panel.id = 'panel-' + prod.id;

    panel.innerHTML = `
      <div class="prod-banner">
        <div class="prod-icon" style="background:${prod.accentDim};box-shadow:0 0 20px ${prod.accent}22;font-size:22px;display:flex;align-items:center;justify-content:center;">${prod.emoji}</div>
        <div>
          <div class="prod-name" style="color:${prod.accent}">${prod.name}</div>
          <div class="prod-meta">${prod.stages.length} stages · ${totalSteps} steps · 📱 Mobile &amp; 🖥️ Web Desktop</div>
        </div>
        <div class="prod-tags">
          <span class="prod-tag" style="border-color:${prod.accent}44;color:${prod.accent}">📱 Mobile</span>
          <span class="prod-tag" style="border-color:${prod.accent}44;color:${prod.accent}">🖥️ Web</span>
        </div>
      </div>
      <div class="scroll-hint"><span class="scroll-hint-arrow">→</span> Scroll right to follow the full journey — stage labels mark each new phase</div>`;

    const boardWrap = document.createElement('div');
    boardWrap.innerHTML = buildProductBoard(prod);
    panel.appendChild(boardWrap);

    pageEl.appendChild(panel);
  });
}

build();
